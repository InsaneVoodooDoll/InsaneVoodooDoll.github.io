<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insane Voodoo Doll - Official Site</title>
    
    <style>
        /* RESET GENERALE STILI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* SFONDO GENERALE CON LA QUARTA FOTO IMPOSTATA */
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), url('IMG_0230.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Lo sfondo resta fermo mentre si scorre la pagina */
            color: #ffffff; /* Testo bianco */
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.6;
            padding: 20px;
        }

        /* CONTENITORE CENTRALE */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        /* TITOLO DELLA BAND */
        .band-name {
            font-size: 3.5rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 40px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0px #000;
        }

        /* SEZIONE DELLA BIOGRAFIA / TESTI */
        .bio-section {
            max-width: 700px;
            margin: 0 auto 40px auto;
            padding: 15px;
            font-size: 1.1rem;
            color: #eeeeee;
            background-color: rgba(0, 0, 0, 0.6); /* Scatola scura per leggere meglio il testo sullo sfondo */
            border-left: 3px solid #ff0000;
        }

        /* ==========================================
           STILE DEI 4 LINK (PUNK/GRUNGE)
           ========================================== */
        .links-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 0 auto 60px auto;
            max-width: 400px;
            padding: 0 20px;
        }

        .punk-link {
            display: block;
            width: 100%;
            text-align: center;
            padding: 15px;
            color: #ffffff;
            background-color: rgba(21, 21, 21, 0.9);
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 1.3rem;
            letter-spacing: 2px;
            border: 3px solid #ffffff;
            box-shadow: 6px 6px 0px #000;
            transition: all 0.2s ease;
        }

        /* Effetto distorsione e cambio colore al passaggio del mouse */
        .punk-link:hover {
            background-color: #ff0000; /* Rosso fuoco */
            color: #000000; /* Testo nero per contrasto tagliente */
            border-color: #ff0000;
            transform: scale(1.04) rotate(-1.5deg); /* Si storce visibilmente */
            box-shadow: -6px 6px 0px #ffffff;
            cursor: pointer;
        }

        /* ==========================================
           STILE DELLA GALLERIA (FANZINE)
           ========================================== */
        .gallery-title {
            color: #ff0000;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0px #000;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 35px;
            padding: 0 20px 60px 20px;
            width: 100%;
        }

        /* Contenitore foto stile pezzo di carta ritagliato male */
        .gallery-item {
            background-color: #1a1a1a;
            padding: 12px;
            border: 2px solid #222;
            box-shadow: 6px 6px 20px rgba(0, 0, 0, 0.9);
            transition: transform 0.3s ease, filter 0.3s ease, border-color 0.3s ease;
            filter: grayscale(100%) contrast(135%); /* Bianco e nero duro ad alto contrasto */
        }

        /* Rotazioni asimmetriche alternate per le tre foto */
        .gallery-item:nth-child(1) { transform: rotate(-3deg); }
        .gallery-item:nth-child(2) { transform: rotate(2.5deg); }
        .gallery-item:nth-child(3) { transform: rotate(-1.5deg); }

        /* Effetto al passaggio del mouse sulle foto */
        .gallery-item:hover {
            filter: grayscale(0%) contrast(100%); /* Torna ai colori reali */
            transform: scale(1.05) rotate(0deg); /* Si raddrizza e si ingrandisce */
            border-color: #ff0000; /* Il bordo diventa rosso */
            z-index: 5;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- TITOLO PRINCIPALE -->
        <h1 class="band-name">Insane Voodoo Doll</h1>

        <!-- SEZIONE TESTI UFFICIALI -->
        <div class="bio-section">
            <p>Benvenuti nel sito ufficiale degli Insane Voodoo Doll. Restate sintonizzati per ricevere tutti gli aggiornamenti sulle prossime uscite discografiche, i concerti dal vivo e il merchandise ufficiale.</p>
        </div>

        <!-- SEZIONE DEI 4 LINK UFFICIALI INSERITI -->
        <div class="links-container">
            <a href="https://distrokid.com/hyperfollow/insanevoodoodoll/we-are-all-insanity-intro--break-all-barriers-2" class="punk-link" target="_blank">DistroKid</a>
            <a href="mailto:insanevoodoodoll@proton.me" class="punk-link">Proton Mail</a>
            <a href="https://www.instagram.com/insane.voodoo.doll?igsh=cGxiMmc3bDNndWdz&utm_source=qr" class="punk-link" target="_blank">Instagram</a>
            <a href="https://www.facebook.com/share/1CcxYGsE47/?mibextid=wwXIfr" class="punk-link" target="_blank">Facebook</a>
        </div>

        <!-- SEZIONE GALLERIA FOTOGRAFICA -->
        <h2 class="gallery-title">Live & Noise</h2>
        <div class="gallery">
            <div class="gallery-item">
                <img src="IMG_0211.jpeg" alt="Insane Voodoo Doll Live 1">
            </div>
            <div class="gallery-item">
                <img src="IMG_0223.jpeg" alt="Insane Voodoo Doll Live 2">
            </div>
            <div class="gallery-item">
                <img src="IMG_0224.jpeg" alt="Insane Voodoo Doll Live 3">
            </div>
        </div>
    </div>

</body>
</html>
